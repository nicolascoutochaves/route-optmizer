name: Tests

# Roda em toda Pull Request contra dev, beta ou master — é o "gate" que
# impede merge de código quebrado. Também roda em push direto a essas
# branches como rede de segurança (ex: merge feito localmente sem PR).
on:
  pull_request:
    branches: [dev, beta, master]
  push:
    branches: [dev, beta, master]

jobs:
  test:
    name: Rodar suíte de testes (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test
